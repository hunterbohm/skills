name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Validate release payload
        run: |
          python3 scripts/validate.py
          python3 scripts/validate/ask-hormozi.py
          python3 scripts/generate-catalog.py --check
      - name: Verify pinned Agent Skills discovery
        env:
          DO_NOT_TRACK: "1"
        run: npx -y skills@1.5.15 add . --list
      - name: Verify current Agent Skills discovery
        env:
          DO_NOT_TRACK: "1"
        run: npx -y skills@latest add . --list
      - name: Verify Codex-only targeting
        env:
          DO_NOT_TRACK: "1"
        run: |
          test_home="$(mktemp -d)"
          HOME="$test_home" npx -y skills@latest add . --skill project-control --agent codex --global -y
          find "$test_home" -path '*/project-control/SKILL.md' -print -quit | grep -q .

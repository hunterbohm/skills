name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DO_NOT_TRACK: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install locked validation tooling
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Validate release payload
        run: npm run validate
      - name: Verify locked Agent Skills discovery
        run: npm run discover
      - name: Verify clean locked install
        run: |
          test_home="$(mktemp -d)"
          HOME="$test_home" ./node_modules/.bin/skills add . --skill ask-hormozi --agent codex --global -y
          diff -qr skills/business/ask-hormozi "$test_home/.agents/skills/ask-hormozi"
      - name: Verify clean Codex-only install
        run: |
          test_home="$(mktemp -d)"
          HOME="$test_home" ./node_modules/.bin/skills add . --skill project-control --agent codex --global -y
          diff -qr skills/project-management/project-control "$test_home/.agents/skills/project-control"
